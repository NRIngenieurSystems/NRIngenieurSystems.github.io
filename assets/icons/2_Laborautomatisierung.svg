<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <rect width="600" height="200" fill="#0f0f0f"/>

  <!-- Clipboard body -->
  <rect x="178" y="32" width="138" height="152" rx="7" stroke="#cbd5e1" stroke-width="2"/>
  <!-- Clip -->
  <rect x="215" y="22" width="63" height="20" rx="5" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="228" y="27" width="38" height="10" rx="3" stroke="#64748b" stroke-width="1.5"/>

  <!-- Bar chart -->
  <rect x="192" y="98" width="18" height="46" rx="2" stroke="#64748b" stroke-width="1.5"/>
  <rect x="216" y="82" width="18" height="62" rx="2" stroke="#f97316" stroke-width="1.5"/>
  <rect x="240" y="110" width="18" height="34" rx="2" stroke="#64748b" stroke-width="1.5"/>
  <rect x="264" y="92" width="18" height="52" rx="2" stroke="#64748b" stroke-width="1.5"/>

  <!-- Text lines -->
  <line x1="192" y1="57" x2="302" y2="57" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="192" y1="70" x2="280" y2="70" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Checkmark badge -->
  <circle cx="398" cy="100" r="48" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="398" cy="100" r="36" stroke="#cbd5e1" stroke-width="2"/>
  <polyline points="380,100 394,115 418,82" stroke="#f97316" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <rect width="600" height="200" fill="#0f0f0f"/>

  <!-- Multimeter body -->
  <rect x="190" y="18" width="220" height="168" rx="12" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Display screen -->
  <rect x="210" y="35" width="180" height="65" rx="6" stroke="#64748b" stroke-width="1.5"/>

  <!-- Display value "–" as measurement readout -->
  <line x1="267" y1="68" x2="333" y2="68" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <line x1="240" y1="58" x2="252" y2="58" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
  <line x1="240" y1="78" x2="252" y2="78" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>

  <!-- Rotary selector knob -->
  <circle cx="300" cy="138" r="30" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="300" cy="138" r="18" stroke="#64748b" stroke-width="1.5"/>
  <!-- Knob indicator -->
  <line x1="300" y1="120" x2="300" y2="112" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Dial markings -->
  <line x1="272" y1="115" x2="268" y2="108" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="328" y1="115" x2="332" y2="108" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="270" y1="145" x2="262" y2="148" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="330" y1="145" x2="338" y2="148" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Test lead sockets at bottom -->
  <circle cx="268" cy="175" r="7" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="268" cy="175" r="3" fill="#64748b"/>
  <circle cx="300" cy="175" r="7" stroke="#f97316" stroke-width="1.5"/>
  <circle cx="300" cy="175" r="3" fill="#f97316"/>
  <circle cx="332" cy="175" r="7" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="332" cy="175" r="3" fill="#64748b"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <rect width="600" height="200" fill="#0f0f0f"/>

  <!-- Outer circuit rectangle -->
  <line x1="120" y1="65" x2="480" y2="65" stroke="#64748b" stroke-width="1.5"/>
  <line x1="120" y1="135" x2="480" y2="135" stroke="#64748b" stroke-width="1.5"/>
  <line x1="120" y1="65" x2="120" y2="90" stroke="#64748b" stroke-width="1.5"/>
  <line x1="120" y1="110" x2="120" y2="135" stroke="#64748b" stroke-width="1.5"/>
  <line x1="480" y1="65" x2="480" y2="135" stroke="#64748b" stroke-width="1.5"/>

  <!-- Voltage source (left) -->
  <line x1="108" y1="90" x2="132" y2="90" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="113" y1="110" x2="127" y2="110" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- + symbol -->
  <line x1="104" y1="86" x2="110" y2="86" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="107" y1="83" x2="107" y2="89" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Resistor top (box style, IEC) -->
  <line x1="175" y1="65" x2="200" y2="65" stroke="#64748b" stroke-width="1.5"/>
  <rect x="200" y="56" width="70" height="18" rx="3" stroke="#f97316" stroke-width="2"/>
  <line x1="270" y1="65" x2="295" y2="65" stroke="#64748b" stroke-width="1.5"/>

  <!-- Node dot -->
  <circle cx="175" cy="65" r="4" fill="#f97316"/>

  <!-- Capacitor (vertical branch from node) -->
  <line x1="175" y1="65" x2="175" y2="88" stroke="#64748b" stroke-width="1.5"/>
  <line x1="157" y1="88" x2="193" y2="88" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="157" y1="98" x2="193" y2="98" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="175" y1="98" x2="175" y2="135" stroke="#64748b" stroke-width="1.5"/>

  <!-- Resistor bottom -->
  <line x1="320" y1="135" x2="345" y2="135" stroke="#64748b" stroke-width="1.5"/>
  <rect x="345" y="126" width="70" height="18" rx="3" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="415" y1="135" x2="440" y2="135" stroke="#64748b" stroke-width="1.5"/>

  <!-- Node dot bottom -->
  <circle cx="440" cy="135" r="4" fill="#64748b"/>

  <!-- Inductor / coil (right side, vertical) -->
  <line x1="480" y1="80" x2="480" y2="65" stroke="#64748b" stroke-width="1.5"/>
  <path d="M480 80 Q492 80 492 90 Q492 100 480 100 Q492 100 492 110 Q492 120 480 120" stroke="#cbd5e1" stroke-width="2" fill="none"/>
  <line x1="480" y1="120" x2="480" y2="135" stroke="#64748b" stroke-width="1.5"/>

  <!-- Ground -->
  <line x1="300" y1="135" x2="300" y2="150" stroke="#64748b" stroke-width="1.5"/>
  <line x1="288" y1="150" x2="312" y2="150" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
  <line x1="293" y1="157" x2="307" y2="157" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="298" y1="164" x2="302" y2="164" stroke="#64748b" stroke-width="1" stroke-linecap="round"/>
</svg>
